metadata:
    name: couchdb
    namespace: chatgpt
    labels:
        com.docker.compose.project: chatgpt
        com.docker.compose.service: couchdb
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: chatgpt
            com.docker.compose.service: couchdb
