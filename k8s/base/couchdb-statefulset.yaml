apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  namespace: chatbot
  labels:
    app.kubernetes.io/name: couchdb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: minigpt
spec:
  serviceName: couchdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: couchdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: couchdb
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: couchdb
          image: couchdb:3.4
          ports:
            - containerPort: 5984
              name: http
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: COUCHDB_USER
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: COUCHDB_PASSWORD
          volumeMounts:
            - name: couchdb-data
              mountPath: /opt/couchdb/data
          livenessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: couchdb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
